<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Title</title>
    <style>
        /* --- EASY MODIFY: Color Palette & Fonts --- */
        :root {
            --primary-color: #4f46e5;      /* Main brand color */
            --primary-hover: #4338ca;
            --bg-color: #f9fafb;           /* Page background */
            --surface-color: #ffffff;      /* Card/Section background */
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* --- BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* --- NAVIGATION --- */
        nav {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 6rem 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        /* --- APP/INTERFACE PLACEHOLDER --- */
        .app-placeholder {
            background-color: var(--surface-color);
            border: 2px dashed var(--border-color);
            border-radius: 1rem;
            padding: 4rem 2rem;
            text-align: center;
            margin: -2rem auto 4rem auto;
            max-width: 800px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* --- FEATURE GRID --- */
        .features {
            padding: 4rem 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
        }

        .card h3 {
            margin-bottom: 0.5rem;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
        }
    </style>
</head>

    
<body>

    <div class="main">
        <h1>Image Compression Project</h1>
        <p>
            This website presents our project on image compression.
        </p>

        <div class="box">
            <h2>About This Website</h2>
            <p>
                Use the navigation below to view our project timeline,
                the challenges we faced, and other parts of our work.
            </p>
        </div>
    </div>
     <nav>
        <a href="index.html">Home</a>
        <a href="timeline.html">Timeline</a>
        <a href="challenges.html">Challenges</a>
    </nav>
</body>
</html>
